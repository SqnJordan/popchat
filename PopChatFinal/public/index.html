
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PopChat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>PopChat</h1>
<p>Encuentra personas con tus mismos gustos</p>

<button onclick="chat()">Solo chat</button>
<button onclick="video()">Chat + cámara</button>
</div>

<script>
function chat(){
localStorage.setItem("tipo","chat");
window.location="chat.html";
}

function video(){
localStorage.setItem("tipo","video");
window.location="video.html";
}
</script>

</body>
</html>
