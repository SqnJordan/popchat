<!DOCTYPE html>
<html lang="es">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6268128887273873"
     crossorigin="anonymous"></script>
  
<meta charset="UTF-8">
<title>PopChat - Chat</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
  <h1>PopChat - Chat</h1>

  <div class="hud">
    <h3>Información de tu pareja:</h3>
    <div id="infoPareja" class="info"></div>
  </div>

  <div id="mensajes"></div>

  <div class="controls">
  <input id="mensajeInput" type="text" placeholder="Escribe tu mensaje...">
  <button onclick="enviarMensaje()">Enviar</button>
  <button onclick="skipPareja()">Skip</button>
  <button onclick="reportar()">Reportar</button>
</div>
     
</div>

<script>
     const input = document.getElementById("mensajeInput");

input.addEventListener("keypress", function(e) {
  if(e.key === "Enter"){
    e.preventDefault(); // evita salto raro
    enviarMensaje();
  }
});
      
const ws = new WebSocket("wss://popchat-tw3u.onrender.com");

     ws.onopen = () => {
  ws.send(JSON.stringify({
    type: "join",
    data: {
      nombre: localStorage.getItem("nombre"),
      edad: localStorage.getItem("edad"),
      genero: localStorage.getItem("genero"),
      pelicula: localStorage.getItem("pelicula"),
      deporte: localStorage.getItem("deporte"),
      clima: localStorage.getItem("clima"),
      color: localStorage.getItem("color"),
      comida: localStorage.getItem("comida"),
      club: localStorage.getItem("club"),
      sueno: localStorage.getItem("sueno")
    }
  }));
};

function agregarMensaje(texto, tipo, usuario){
  const mensajes = document.getElementById('mensajes');
  const p = document.createElement('p');
  const hora = new Date();
  const horaStr = hora.getHours().toString().padStart(2,'0') + ':' + hora.getMinutes().toString().padStart(2,'0');
  p.innerHTML = `<strong>${usuario}</strong> [${horaStr}]: ${texto}`;
  p.className = tipo;
  mensajes.appendChild(p);
  mensajes.scrollTop = mensajes.scrollHeight;
}

function enviarMensaje(){
  const input = document.getElementById('mensajeInput');
  const texto = input.value.trim();
  if(!texto) return;
  agregarMensaje(texto,"self","Yo");
  ws.send(JSON.stringify({type:"message", data:{texto: texto}}));
  input.value = "";
}

function skipPareja(){
  ws.send(JSON.stringify({type:"skip"}));
  document.getElementById('infoPareja').innerHTML = "<p>Buscando otra persona...</p>";
}

// Recibir mensajes y datos de la pareja
ws.onmessage = (msg)=>{
  const data = JSON.parse(msg.data);

  if(data.type === "infoPareja"){
    const infoDiv = document.getElementById('infoPareja');
    infoDiv.innerHTML = `
      <p><strong>Nombre:</strong> ${data.data.nombre}</p>
      <p><strong>Género:</strong> ${data.data.genero}</p>
      <p><strong>Edad:</strong> ${data.data.edad}</p>
      <p><strong>Color favorito:</strong> ${data.data.color}</p>
      <p><strong>Comida favorita:</strong> ${data.data.comida}</p>
      <p><strong>Club:</strong> ${data.data.club}</p>
      <p><strong>Película favorita:</strong> ${data.data.pelicula}</p>
      <p><strong>Deporte:</strong> ${data.data.deporte}</p>
      <p><strong>Clima:</strong> ${data.data.clima}</p>
      <p><strong>Hobby:</strong> ${data.data.hobby}</p>
      <p><strong>Sueño:</strong> ${data.data.sueno}</p>
    `;
  }

  if(data.type === "message"){
    agregarMensaje(data.data.texto, "other", data.data.usuario);
  }

  if(data.type === "skip"){
    document.getElementById('infoPareja').innerHTML = "<p>Te desconectaste de tu pareja. Buscando otra...</p>";
  }
};
</script>

</body>
</html>
