<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PopChat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>PopChat</h1>
<p>Encuentra personas con tus mismos gustos</p>

<input type="text" id="nombre" placeholder="Tu nombre">

<select id="genero">
<option value="">Tu género</option>
<option>Hombre</option>
<option>Mujer</option>
<option>Prefiero no decirlo</option>
</select>

<select id="pelicula">
<option value="">Película favorita</option>
<option>Avengers</option>
<option>Spider-Man</option>
<option>Harry Potter</option>
<option>Rápidos y Furiosos</option>
<option>Batman</option>
<option>No tengo</option>
</select>

<select id="deporte">
<option value="">Deporte favorito</option>
<option>Fútbol</option>
<option>Basket</option>
<option>Tennis</option>
<option>Gym</option>
<option>No tengo</option>
</select>

<select id="clima">
<option value="">Clima favorito</option>
<option>Frío</option>
<option>Calor</option>
<option>Lluvia</option>
<option>Nublado</option>
<option>Ninguno</option>
</select>

<textarea id="sueno" placeholder="¿Cuál es tu sueño?"></textarea>

<button onclick="chat()">Solo chat</button>
<button onclick="video()">Chat + cámara</button>

</div>

<script>
function chat(){
localStorage.setItem("tipo","chat");
window.location="chat.html";
}

function video(){
localStorage.setItem("tipo","video");
window.location="video.html";
}
</script>

</body>
</html>
