<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PopChat - Encuentra gente</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
  <h1>Bienvenido a PopChat</h1>
  <p>Encuentra personas con tus mismos gustos. Completa el formulario:</p>

  <form id="userForm">

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre" required>
    </div>

    <div class="form-group">
      <label>Edad</label>
      <input type="number" id="edad" placeholder="Tu edad" required>
    </div>

    <div class="form-group">
      <label>Género</label>
      <select id="genero" required>
        <option value="">Selecciona</option>
        <option>Hombre</option>
        <option>Mujer</option>
        <option>Prefiero no decirlo</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tipo de chat</label>
      <select id="tipoChat" required>
        <option value="">Selecciona</option>
        <option value="chat">Solo chat</option>
        <option value="video">Chat + cámara</option>
      </select>
    </div>

    <div class="form-group">
      <label>Película favorita</label>
      <select id="peliculaSelect">
        <option value="">Selecciona</option>
        <option>Avengers</option>
        <option>Harry Potter</option>
        <option>Batman</option>
        <option>No tengo</option>
        <option value="manual">Escribir manual</option>
      </select>
      <input type="text" id="peliculaManual" placeholder="Escribe tu película" style="display:none;">
    </div>

    <div class="form-group">
      <label>Deporte favorito</label>
      <select id="deporteSelect">
        <option value="">Selecciona</option>
        <option>Fútbol</option>
        <option>Basket</option>
        <option>Tennis</option>
        <option>Gym</option>
        <option>No tengo</option>
        <option value="manual">Escribir manual</option>
      </select>
      <input type="text" id="deporteManual" placeholder="Escribe tu deporte" style="display:none;">
    </div>

    <div class="form-group">
      <label>Clima favorito</label>
      <select id="clima" required>
        <option value="">Selecciona</option>
        <option>Frío</option>
        <option>Calor</option>
        <option>Lluvia</option>
        <option>Nublado</option>
        <option>Ninguno</option>
      </select>
    </div>

    <div class="form-group">
      <label>Color favorito</label>
      <select id="colorSelect">
        <option value="">Selecciona</option>
        <option>Verde</option>
        <option>Azul</option>
        <option>Rojo</option>
        <option>Amarillo</option>
        <option value="manual">Escribir manual</option>
      </select>
      <input type="text" id="colorManual" placeholder="Escribe tu color" style="display:none;">
    </div>

    <div class="form-group">
      <label>Comida favorita</label>
      <select id="comidaSelect">
        <option value="">Selecciona</option>
        <option>Pizza</option>
        <option>Hamburguesa</option>
        <option>Sushi</option>
        <option>Pasta</option>
        <option value="manual">Escribir manual</option>
      </select>
      <input type="text" id="comidaManual" placeholder="Escribe tu comida" style="display:none;">
    </div>

    <div class="form-group">
      <label>Hincha de qué club</label>
      <select id="clubSelect">
        <option value="">Selecciona</option>
        <option>Boca Juniors</option>
        <option>River Plate</option>
        <option>Real Madrid</option>
        <option>Barcelona</option>
        <option value="manual">Escribir manual</option>
      </select>
      <input type="text" id="clubManual" placeholder="Escribe tu club" style="display:none;">
    </div>

    <div class="form-group">
      <label>Tu sueño</label>
      <textarea id="sueno" placeholder="Escribe tu sueño"></textarea>
    </div>

    <button type="button" onclick="proseguir()">Continuar</button>
  </form>
</div>

<script>
function proseguir(){
  const nombre = document.getElementById("nombre").value;
  const edad = document.getElementById("edad").value;
  const genero = document.getElementById("genero").value;
  const tipo = document.getElementById("tipoChat").value;

  const pelSelect = document.getElementById("peliculaSelect");
  let pelicula = pelSelect.value;
  if(pelicula === "manual") pelicula = document.getElementById("peliculaManual").value || "No tengo";

  const depSelect = document.getElementById("deporteSelect");
  let deporte = depSelect.value;
  if(deporte === "manual") deporte = document.getElementById("deporteManual").value || "Ninguno";

  const colorSelect = document.getElementById("colorSelect");
  let color = colorSelect.value;
  if(color === "manual") color = document.getElementById("colorManual").value || "Ninguno";

  const comidaSelect = document.getElementById("comidaSelect");
  let comida = comidaSelect.value;
  if(comida === "manual") comida = document.getElementById("comidaManual").value || "Ninguna";

  const clubSelect = document.getElementById("clubSelect");
  let club = clubSelect.value;
  if(club === "manual") club = document.getElementById("clubManual").value || "Ninguno";

  const clima = document.getElementById("clima").value;
  const sueno = document.getElementById("sueno").value;

  if(!nombre || !edad || !genero || !tipo) { alert("Completa los campos obligatorios"); return; }

  localStorage.setItem("nombre", nombre);
  localStorage.setItem("edad", edad);
  localStorage.setItem("genero", genero);
  localStorage.setItem("tipo", tipo);
  localStorage.setItem("pelicula", pelicula);
  localStorage.setItem("deporte", deporte);
  localStorage.setItem("clima", clima);
  localStorage.setItem("color", color);
  localStorage.setItem("comida", comida);
  localStorage.setItem("club", club);
  localStorage.setItem("sueno", sueno);

  if(tipo==="chat") window.location="chat.html";
  else window.location="video.html";
}

['pelicula','deporte','color','comida','club'].forEach(id=>{
  const select = document.getElementById(id+'Select');
  const manual = document.getElementById(id+'Manual');
  select.addEventListener('change', ()=>{
    manual.style.display = (select.value==="manual") ? "block" : "none";
  });
});
</script>

</body>
</html>
