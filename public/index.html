<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PopChat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>PopChat</h1>
<p>Encuentra personas con tus mismos gustos</p>

<input type="text" id="nombre" placeholder="Tu nombre">
<select id="genero">
  <option value="">Género</option>
  <option>Hombre</option>
  <option>Mujer</option>
  <option>Prefiero no decirlo</option>
</select>
<select id="tipoChat">
  <option value="">Elegir</option>
  <option value="chat">Solo chat</option>
  <option value="video">Chat + cámara</option>
</select>

<button onclick="proseguir()">Continuar</button>
</div>

<script>
function proseguir(){
  const nombre = document.getElementById("nombre").value;
  const genero = document.getElementById("genero").value;
  const tipo = document.getElementById("tipoChat").value;
  if(!nombre || !genero || !tipo){ alert("Completa todo"); return; }
  localStorage.setItem("nombre", nombre);
  localStorage.setItem("genero", genero);
  localStorage.setItem("tipo", tipo);
  window.location="chat.html";
}
</script>
</body>
</html>
