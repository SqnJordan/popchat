<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PopChat - VideoChat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="video-container">

  <div class="video-left">
    <video id="localVideo" autoplay muted></video>
  </div>

  <div class="video-right">
    <video id="remoteVideo" autoplay></video>

    <div class="hud">
      <div class="info">
        <p id="infoNombre"></p>
        <p id="infoEdadGenero"></p>
        <p id="infoGustos"></p>
      </div>

      <div id="mensajes" style="max-height:150px; overflow-y:auto;"></div>

      <div class="controls">
        <input type="text" id="mensajeInput" placeholder="Escribe tu mensaje...">
        <button onclick="enviarMensaje()">Enviar</button>
        <button onclick="skipPersona()">Skip</button>
      </div>
    </div>
  </div>

</div>

<script>
document.getElementById("infoNombre").innerText = localStorage.getItem("nombre") || "";
document.getElementById("infoEdadGenero").innerText = `${localStorage.getItem("edad") || ""} años, ${localStorage.getItem("genero") || ""}`;
document.getElementById("infoGustos").innerText = `Película: ${localStorage.getItem("pelicula") || ""}, Deporte: ${localStorage.getItem("deporte") || ""}, Club: ${localStorage.getItem("club") || ""}`;

const mensajes = document.getElementById("mensajes");
let ws;
let localStream;
let pc;
let remoteVideo = document.getElementById("remoteVideo");

// WebSocket para chat y señalización WebRTC
function iniciarVideoChat(){
  ws = new WebSocket("wss://" + window.location.host);

  ws.onopen = ()=> {
    ws.send(JSON.stringify({type:"join", data:getUsuario()}));
    iniciarCamara();
  };

  ws.onmessage = async (msg)=>{
    const m = JSON.parse(msg.data);

    if(m.type==="signal"){
      if(m.data.desc) {
        await pc.setRemoteDescription(new RTCSessionDescription(m.data.desc));
        if(m.data.desc.type==="offer"){
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          ws.send(JSON.stringify({type:"signal", data:{desc:answer}}));
        }
      }
      if(m.data.cand) await pc.addIceCandidate(new RTCIceCandidate(m.data.cand));
    }

    if(m.type==="message"){
      mostrarMensaje(m.data.texto, m.data.usuario===getUsuario().nombre?"self":"other");
    }

    if(m.type==="skip"){
      mensajes.innerHTML = "";
      alert("Has pasado a la siguiente persona");
    }
  };
}

// Info del usuario
function getUsuario(){
  return {
    nombre: localStorage.getItem("nombre"),
    edad: localStorage.getItem("edad"),
    genero: localStorage.getItem("genero"),
    pelicula: localStorage.getItem("pelicula"),
    deporte: localStorage.getItem("deporte"),
    club: localStorage.getItem("club"),
    clima: localStorage.getItem("clima"),
    color: localStorage.getItem("color"),
    comida: localStorage.getItem("comida"),
    sueno: localStorage.getItem("sueno")
  };
}

// Chat
function mostrarMensaje(texto, tipo){
  const p = document.createElement("p");
  p.className = tipo;
  p.innerText = texto;
  mensajes.appendChild(p);
  mensajes.scrollTop = mensajes.scrollHeight;
}

function enviarMensaje(){
  const input = document.getElementById("mensajeInput");
  const texto = input.value.trim();
  if(!texto) return;
  mostrarMensaje(texto,"self");
  ws.send(JSON.stringify({type:"message", data:{texto:texto, usuario:getUsuario().nombre}}));
  input.value="";
}

function skipPersona(){
  ws.send(JSON.stringify({type:"skip"}));
  mensajes.innerHTML="";
}

// WebRTC
async function iniciarCamara(){
  localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
  document.getElementById("localVideo").srcObject = localStream;

  pc = new RTCPeerConnection();

  // Enviar candidatos ICE
  pc.onicecandidate = e => { if(e.candidate) ws.send(JSON.stringify({type:"signal", data:{cand:e.candidate}})) };

  // Agregar stream remoto
  pc.ontrack = e => { remoteVideo.srcObject = e.streams[0]; };

  // Agregar pistas locales
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // Crear oferta
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({type:"signal", data:{desc:offer}}));
}

window.onload = iniciarVideoChat;
</script>

</body>
</html>
