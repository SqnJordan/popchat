<!DOCTYPE html>
<html lang="es">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6268128887273873"
     crossorigin="anonymous"></script>
  
<meta charset="UTF-8">
<title>PopChat - Video</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
  <h1>PopChat - Video</h1>

  <div class="hud">
    <h3>Información de tu pareja:</h3>
    <div id="infoPareja" class="info"></div>
  </div>

  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>

  <div id="mensajes"></div>
  <div class="controls">
    <input id="mensajeInput" type="text" placeholder="Escribe tu mensaje...">
    <button onclick="enviarMensaje()">Enviar</button>
    <button onclick="skipPareja()">Skip</button>
  </div>
</div>

<script>
const ws = new WebSocket("wss://popchat-tw3u.onrender.com");

let localStream;
let peer;

// 👇 ENVIAR JOIN
ws.onopen = () => {
  ws.send(JSON.stringify({
    type: "join",
    data: {
      nombre: localStorage.getItem("nombre"),
      edad: localStorage.getItem("edad"),
      genero: localStorage.getItem("genero"),
      pelicula: localStorage.getItem("pelicula"),
      deporte: localStorage.getItem("deporte"),
      clima: localStorage.getItem("clima"),
      color: localStorage.getItem("color"),
      comida: localStorage.getItem("comida"),
      club: localStorage.getItem("club"),
      sueno: localStorage.getItem("sueno")
    }
  }));
};

// 🎥 TU CAMARA
const localVideo = document.getElementById('localVideo');
navigator.mediaDevices.getUserMedia({video:true, audio:true})
.then(stream => {
  localStream = stream;
  localVideo.srcObject = stream;
})
.catch(err => {
  console.error("Error cámara:", err);
});

// ⚡ CREAR PEER
function crearPeer(){
 peer = new RTCPeerConnection({
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
});

  // 👇 PROTECCIÓN
  if(localStream){
    localStream.getTracks().forEach(track => {
      peer.addTrack(track, localStream);
    });
  }

  peer.ontrack = e => {
    document.getElementById("remoteVideo").srcObject = e.streams[0];
  };

  peer.onicecandidate = e => {
    if(e.candidate){
      ws.send(JSON.stringify({type:"signal", data:e.candidate}));
    }
  };
}
     

// 📩 MENSAJES
ws.onmessage = async (msg) => {
  const data = JSON.parse(msg.data);

  if(data.type === "infoPareja"){
    const infoDiv = document.getElementById('infoPareja');
    infoDiv.innerHTML = `
      <p><strong>Nombre:</strong> ${data.data.nombre}</p>
      <p><strong>Edad:</strong> ${data.data.edad}</p>
      <p><strong>Género:</strong> ${data.data.genero}</p>
    `;

    // 👇 iniciar conexión video
    crearPeer();

    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    ws.send(JSON.stringify({type:"signal", data:offer}));
  }

  if(data.type === "signal"){
    if(!peer) crearPeer();

    if(data.data.type === "offer"){
  await peer.setRemoteDescription(new RTCSessionDescription(data.data));

  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);

  ws.send(JSON.stringify({type:"signal", data:answer}));
}
         

    else if(data.data.type === "answer"){
      await peer.setRemoteDescription(new RTCSessionDescription(data.data));
    }

    else{
      await peer.addIceCandidate(new RTCIceCandidate(data.data));
    }
  }

  if(data.type === "message"){
    agregarMensaje(data.data.texto, "other", data.data.usuario);
  }
};

// 💬 CHAT
function agregarMensaje(texto, tipo, usuario){
  const mensajes = document.getElementById('mensajes');
  const p = document.createElement('p');
  const hora = new Date().toLocaleTimeString();
  p.innerHTML = `<strong>${usuario}</strong> [${hora}]: ${texto}`;
  mensajes.appendChild(p);
}

function enviarMensaje(){
  const input = document.getElementById('mensajeInput');
  const texto = input.value.trim();
  if(!texto) return;

  agregarMensaje(texto,"self","Yo");
  ws.send(JSON.stringify({type:"message", data:{texto}}));
  input.value = "";
}

function skipPareja(){
  ws.send(JSON.stringify({type:"skip"}));
}
</script>

</body>
</html>
